name: Flutter Android Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze --no-fatal-infos

      - name: Patch image_gallery_saver namespace for AGP
        shell: bash
        run: |
          PLUGIN_GRADLE_FILE=$(ls -d "$HOME/.pub-cache/hosted/pub.dev/image_gallery_saver-"*/android/build.gradle | head -n 1)
          if [ -z "$PLUGIN_GRADLE_FILE" ]; then
            echo "image_gallery_saver plugin gradle file not found"
            exit 1
          fi

          echo "Patching: $PLUGIN_GRADLE_FILE"
          if grep -q "namespace" "$PLUGIN_GRADLE_FILE"; then
            echo "Namespace already present"
          else
            sed -i '/android {/a\    namespace "com.example.image_gallery_saver"' "$PLUGIN_GRADLE_FILE"
            echo "Namespace injected"
          fi

          if grep -q "kotlinOptions" "$PLUGIN_GRADLE_FILE"; then
            echo "Kotlin options already present"
          else
            sed -i '/android {/a\    kotlinOptions {\n        jvmTarget = "1.8"\n    }' "$PLUGIN_GRADLE_FILE"
            echo "Kotlin JVM target injected"
          fi

          if grep -q "compileOptions" "$PLUGIN_GRADLE_FILE"; then
            echo "Compile options already present"
          else
            sed -i '/android {/a\    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n    }' "$PLUGIN_GRADLE_FILE"
            echo "Java compile target injected"
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
